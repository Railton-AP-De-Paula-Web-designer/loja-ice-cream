<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ice-Card</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<main>
    <div class="item active" style="--background: #ea3d41">
        <div class="title">morango</div>
        <img src="./assets/Morango-pedaco.png.png" class="fruit" alt="pedaço-morango">
        <img src="./assets/picole.morango22_47_51.png" class="picole" alt="picole-morango">
    </div>

        <div class="item" style="--background: #e7a043">
        <div class="title">laranja</div>
        <img src="./assets/tangerinapng.png" class="fruit" alt="pedaço-laranja">
        <img src="./assets/picole-laranja, 22_43_05.png" class="picole" alt="picole-laranja">
    </div>

        <div class="item" style="--background: #ffd700">
        <div class="title">milho-verde</div>
        <img src="./assets/milhoback.png" class="fruit" alt="pedaço-milho">
        <img src="./assets/picole-milho 22_37_48.png" class="picole" alt="picole-milho">
    </div>

    <div class="item" style="--background: #4b0082">
        <div class="title">açai</div>
        <img src="./assets/aacai.png.png" class="fruit" alt="acai">
        <img src="./assets/p-acai.png.png" class="picole" alt="picole-acai">
    </div>

    <div class="item" style="--background: #ff1493">
     <div class="title">chiclete</div>
     <img src="./assets/chicleteback.png.png" class="fruit" alt="chiclete">
     <img src="./assets/p-chiclete.png.png" class="picole" alt="chiclete">
    </div>

    <div class="item" style="--background: #a0522d">
        <div class="title">chocolate</div>
        <img src="./assets/chocolateback.png.png" class="fruit" alt="chocolate">
        <img src="./assets/p-choco.png.png" class="picole" alt="chocolate">
    </div>

    <div class="item" style="--background: #fffff0">
        <div class="title">leitinho</div>
        <img src="./assets/copoleiteback.png.png" class="fruit" alt="leite">
        <img src="./assets/p-leitinho.png.png" class="picole" alt="leitinho">
    </div>

    <div class="item" style="--background: #00008b">
        <div class="title">pinta-lingua</div>
        <img src="./assets/pintalinguaback.png" class="fruit" alt="pinta-lingua">
        <img src="./assets/p-pintalingua.png.png" class="picole" alt="pinta-lingua">
    </div>

    <div class="item" style="--background: #7cfc00">
        <div class="title">goiaba</div>
        <img src="./assets/goiababack.png.png" class="fruit" alt="goiaba">
        <img id="picole-goiaba" src="./assets/p-goiaba.png.png"  class="picole" alt="goiaba">
    </div>
    <div class="item" style="--background:#dc143c">
        <div class="title">melancia</div>
        <img src="./assets/melanciaback.png.png" class="fruit" alt="melancia">
        <img id="picole-melancia" src="./assets/p-melancia.png.png" class="picole" alt="melancia">
    </div>

    <div class="item" style="--background:#ffd700">
    <div class="title">maracuja</div>
    <img src="./assets/maracuja.png" class="fruit" alt="maracuja">
    <img src="./assets/p-maracuja.png" class="picole" alt="maracuja">
    </div>

    <div class="item" style="--background:#7fff00">
        <div class="title">maça-verde</div>
        <img src="./assets/mmacaverde.png.png" class="fruit" alt="maca-verde">
        <img id="picole-maca-verde" src="./assets/p-maca-verde.png.png" class="picole" alt="maca-verde">
    </div>

    <div class="item" style="--background:#b22222">
        <div class="title">groselha</div>
        <img src="./assets/groselha-back.png.png" class="fruit" alt="groselha">
        <img id="picole-groselha" src="./assets/p-groselha.png.png" class="picole" alt="groselha">
    </div>

    <div class="item" style="--background:#6b8e23">
        <div class="title">abacaxi</div>
        <img  src="./assets/aabacaxi.png.png" class="fruit" alt="abacaxi">
        <img id="picole-abacaxi" src="./assets/p-abacaxi.png.png" class="picole" alt="abacaxi">
    </div>

    <div class="item" style="--background:#4b0082">
        <div class="title">uva</div>
        <img src="./assets/uva.backpng.png" class="fruit" alt="uva">
        <img id="picole-uva" src="./assets/p-uva.png" class="picole" alt="uva">
    </div>

    <div class="item" style="--background:#ffffe0">
        <div class="title">chocolate-branco</div>
        <img src="./assets/chocolatebrancoback.png.png" class="fruit" alt="chocolate-branco">
        <img id="picole-branco" src="./assets/p-choco-branco.png.png" class="picole" alt="choclate-branco">
    </div>

    <div class="item" style="--background:#a0522d">
        <div class="title">coco-branco</div>
        <img src="./assets/cocoback.png.png" class="fruit" alt="coco">
        <img id="picole-cocobranco" src="./assets/p-cocobranco.png.png" class="picole" alt="coco-branco">
    </div>


    <div class="arrow">

        <button id="prev"> < </button>
        <button id="next"> > </button>

    </div>
</main>
    
</body>

<script src="./script.js"></script>

</html>
