<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ice-Banner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<main>
    <div class="item active" style="--background: #ea3d41">
        <div class="title">morango</div>
        <img src="./assets/Morango-pedaco.png.png" class="fruit" alt="pedaço-morango">
        <img src="./assets/picole.morango22_47_51.png" class="picole" alt="picole-morango">
    </div>

        <div class="item" style="--background: #e7a043">
        <div class="title">laranja</div>
        <img src="./assets/Morango-pedaco.png.png" class="fruit" alt="pedaço-laranja">
        <img src="./assets/picole-laranja, 22_43_05.png" class="picole" alt="picole-laranja">
    </div>

        <div class="item hidden" style="--background: #ffd700">
        <div class="title">milho-verde</div>
        <img src="./assets/Morango-pedaco.png.png" class="fruit" alt="pedaço-milho">
        <img src="./assets/picole-milho 22_37_48.png" class="picole" alt="picole-morango">
    </div>

    <div class="arrow">

        <button id="prev"> < </button>
        <button id="next"> > </button>

    </div>
</main>
    
</body>

<script src="./script.js"></script>

</html>
